services:
 mlflow:
   image: ghcr.io/mlflow/mlflow:latest
   container_name: mlflow
   command: >
    mlflow server
    --backend-store-uri sqlite:////mlflow/db/mlruns.db
    --artifacts-destination /mlflow/artifacts
    --serve-artifacts
    --host 0.0.0.0
    --port 5001
    --allowed-hosts "*" 
    --cors-allowed-origins "*"
   ports:
    - "5001:5001"
   volumes:
    - mlflow-db:/mlflow/db           # ← separate subdirectory for db
    - mlflow-artifacts:/mlflow/artifacts
   restart: unless-stopped


volumes:
 mlflow-db:
 mlflow-artifacts:
